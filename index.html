<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Campus Marketplace — Home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-primary px-4">
    <span class="navbar-brand fw-bold">Campus Marketplace</span>
    <div class="d-flex align-items-center gap-2">
      <span id="currentUserEmail" class="text-white small opacity-75"></span>
      <button id="signout-btn" class="btn btn-outline-light btn-sm">Sign Out</button>
    </div>
  </nav>

  <!-- Welcome heading -->
  <div class="container mt-5">
    <div class="text-center mb-5">
      <h2 class="fw-bold">Welcome to Campus Marketplace</h2>
      <p class="text-muted">Buy, sell, and trade items with fellow students.</p>
    </div>

    <!-- nav-card hover effect is defined in style.css -->
    <div class="row g-4 justify-content-center">

      <div class="col-md-4">
        <a href="marketplace.html" class="nav-card text-decoration-none text-dark">
          <div class="card shadow-sm h-100 text-center p-4">
            <div class="fs-1 mb-3">🛍️</div>
            <h5 class="fw-bold">Browse Marketplace</h5>
            <p class="text-muted small">Find items listed by other students.</p>
          </div>
        </a>
      </div>

      <div class="col-md-4">
        <a href="mylistings.html" class="nav-card text-decoration-none text-dark">
          <div class="card shadow-sm h-100 text-center p-4">
            <div class="fs-1 mb-3">📦</div>
            <h5 class="fw-bold">My Listings</h5>
            <p class="text-muted small">Manage the items you have listed for sale.</p>
          </div>
        </a>
      </div>

      <div class="col-md-4">
        <a href="shortlist.html" class="nav-card text-decoration-none text-dark">
          <div class="card shadow-sm h-100 text-center p-4">
            <div class="fs-1 mb-3">❤️</div>
            <h5 class="fw-bold">My Shortlist</h5>
            <p class="text-muted small">View items you have saved for later.</p>
          </div>
        </a>
      </div>

    </div>
  </div>

  <script type="module" src="./js/auth.js"></script>
  <script type="module" src="./js/index.js"></script>
</body>
</html>
