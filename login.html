<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Campus Marketplace — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="bg-light">

  <!-- login-wrapper is defined in style.css: centered card, max 400px wide -->
  <div class="login-wrapper">
    <h4 class="fw-bold mb-1">Campus Marketplace</h4>
    <p class="text-muted small mb-4">Sign in to your student account</p>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input id="emailInput" type="email" class="form-control" placeholder="you@student.com"/>
    </div>

    <div class="mb-3">
      <label class="form-label">Password</label>
      <input id="passwordInput" type="password" class="form-control" placeholder="Password"/>
    </div>

    <!-- messageArea gets class msg-error or msg-success from auth.js -->
    <p id="messageArea" class="mb-3"></p>

    <button id="signInButton" type="button" class="btn btn-primary w-100">Sign In</button>
  </div>

  <script type="module" src="./js/auth.js"></script>
</body>
</html>
