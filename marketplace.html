<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Campus Marketplace — Browse</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-primary px-4">
    <span class="navbar-brand fw-bold">Campus Marketplace</span>
    <div class="d-flex align-items-center gap-2">
      <span id="user-email" class="text-white small opacity-75"></span>
      <a href="index.html" class="btn btn-outline-light btn-sm">Home</a>
      <button id="signout-btn" class="btn btn-outline-light btn-sm">Sign Out</button>
    </div>
  </nav>

  <div class="container mt-4">
    <h3 class="mb-3">Browse Marketplace</h3>

    <!-- Filters -->
    <div class="row g-2 mb-4">
      <div class="col-md-6">
        <input type="text" id="search-input" class="form-control" placeholder="Search by name or description…"/>
      </div>
      <div class="col-md-3">
        <select id="category-filter" class="form-select">
          <option value="">All Categories</option>
          <option value="Books">Books</option>
          <option value="Electronics">Electronics</option>
          <option value="Clothing">Clothing</option>
          <option value="Furniture">Furniture</option>
          <option value="Other">Other</option>
        </select>
      </div>
    </div>

    <!-- Loading spinner -->
    <div id="loading" class="text-center py-5">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="text-muted mt-2 small">Loading items…</p>
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="text-center text-muted py-5 d-none">
      <h5>No items found.</h5>
      <p class="small">Try a different search or category.</p>
    </div>

    <!-- Item cards grid -->
    <div id="items-container" class="row g-4 d-none"></div>
  </div>

  <script type="module" src="js/marketplace.js"></script>
</body>
</html>
