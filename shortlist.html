<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Campus Marketplace — My Shortlist</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-primary px-4">
    <span class="navbar-brand fw-bold">Campus Marketplace</span>
    <div class="d-flex align-items-center gap-2">
      <span id="user-email" class="text-white small opacity-75"></span>
      <a href="index.html" class="btn btn-outline-light btn-sm">Home</a>
      <button id="signout-btn" class="btn btn-outline-light btn-sm">Sign Out</button>
    </div>
  </nav>

  <div class="container mt-4">
    <h3 class="mb-3">My Shortlist</h3>

    // loading spinner
    <div id="loading" class="text-center py-5">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="text-muted mt-2 small">Loading your shortlist…</p>
    </div>

    // empty state 
    <div id="empty-state" class="text-center text-muted py-5 d-none">
      <h5>Your shortlist is empty.</h5>
      <p class="small">Head to the <a href="marketplace.html">Marketplace</a> and shortlist some items!</p>
    </div>

    // Shortlist rows
    <div id="items-container" class="d-none"></div>
  </div>

  <script type="module" src="js/shortlist.js"></script>
</body>
</html>
